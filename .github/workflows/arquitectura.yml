name: Validacion Arquitectonica

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  arquitectura:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compilar y ejecutar pruebas de arquitectura
        run: ./mvnw -Dtest=ReglasArquitectura test --no-transfer-progress

      - name: Ejecutar suite completa de pruebas
        run: ./mvnw verify --no-transfer-progress

      - name: Documentar decisiones en formato ADR
        run: |
          echo "ADR disponibles en docs/adr/"
          ls -1 docs/adr
